<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임시메일 - Disposable Email</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-header">
    <div class="top-inner">
      <div class="brand">
        <h1>임시메일</h1>
        <span class="sync-status" id="syncStatus"></span>
      </div>
      <div class="auth-bar">
        <button id="loginBtn" class="btn btn-outline btn-sm">로그인</button>
        <div id="userInfo" class="user-info" style="display:none;">
          <span id="userEmail"></span>
          <button id="logoutBtn" class="btn btn-outline btn-sm">로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <!-- 로그인 모달 -->
  <div class="modal-overlay" id="loginModal" style="display:none;">
    <div class="modal">
      <h2>로그인</h2>
      <p class="modal-desc">로그인하면 모든 브라우저에서 임시 메일 세션이 동기화됩니다.</p>
      <input type="email" id="loginEmail" placeholder="이메일" />
      <input type="password" id="loginPassword" placeholder="비밀번호" />
      <div class="modal-actions">
        <button id="emailLoginBtn" class="btn btn-primary">이메일 로그인</button>
        <button id="googleLoginBtn" class="btn btn-secondary">Google 로그인</button>
      </div>
      <button id="closeModalBtn" class="btn btn-outline">닫기</button>
    </div>
  </div>

  <main class="layout">
    <!-- 좌측 사이드바: 메일 생성 + 목록 -->
    <aside class="sidebar">
      <section class="email-section">
        <div class="email-display" id="emailDisplay">
          <span class="placeholder">메일 주소를 생성하세요</span>
        </div>
        <div class="retention-info" id="retentionInfo"></div>
        <div class="email-actions">
          <button id="generateBtn" class="btn btn-primary">새 메일 생성</button>
          <button id="copyBtn" class="btn btn-secondary" disabled>복사</button>
          <button id="customBtn" class="btn btn-secondary">직접 입력</button>
        </div>
        <div class="custom-email" id="customSection" style="display:none;">
          <div class="custom-input-group">
            <input type="text" id="customLogin" placeholder="아이디" />
            <span>@</span>
            <select id="domainSelect"></select>
          </div>
          <button id="customApplyBtn" class="btn btn-primary">사용하기</button>
        </div>
      </section>

      <section class="history-section" id="historySection" style="display:none;">
        <h2>이전 메일 주소</h2>
        <div class="history-list" id="historyList"></div>
      </section>
    </aside>

    <!-- 우측 메인: 받은 메일함 + 뷰어 -->
    <section class="main-panel">
      <div class="refresh-section">
        <h2 class="panel-title">받은 메일함 <span class="badge" id="mailCount">0</span></h2>
        <label class="auto-refresh">
          <input type="checkbox" id="autoRefresh" checked />
          <span>자동 새로고침 (5초)</span>
        </label>
        <button id="refreshBtn" class="btn btn-outline btn-sm" disabled>새로고침</button>
        <span class="timer" id="timer"></span>
      </div>

      <div class="inbox-wrapper">
        <div class="inbox" id="inbox">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📭</div>
            <p>아직 받은 메일이 없습니다</p>
            <p class="hint">좌측에서 메일을 생성하거나 선택하세요</p>
          </div>
        </div>

        <div class="viewer-section" id="viewerSection" style="display:none;">
          <div class="viewer-header">
            <button id="backBtn" class="btn btn-outline btn-sm">← 목록</button>
            <h2 id="viewerSubject">제목</h2>
          </div>
          <div class="viewer-meta">
            <div><strong>보낸 사람:</strong> <span id="viewerFrom"></span></div>
            <div><strong>받은 시간:</strong> <span id="viewerDate"></span></div>
          </div>
          <div class="viewer-body" id="viewerBody"></div>
          <div class="viewer-attachments" id="viewerAttachments" style="display:none;">
            <h3>첨부파일</h3>
            <ul id="attachmentList"></ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 알림 토스트 -->
  <div class="toast" id="toast"></div>

  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-left">
        <span class="footer-brand">© 2026 <strong>KHS</strong></span>
        <span class="footer-divider">•</span>
        <span class="footer-made">Crafted with <span class="heart">♥</span> by Claude Code</span>
      </div>
      <div class="footer-right">
        <a href="https://github.com/miracle38/temp-mail" target="_blank" rel="noopener" class="footer-link" title="View on GitHub">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
      </div>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
