<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://apis.google.com https://*.google.com; connect-src 'self' https://api.mail.tm https://api.mail.gw https://www.gstatic.com https://*.firebaseio.com https://*.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.google.com https://accounts.google.com wss://*.firebaseio.com wss://*.firebaseio.com:443; style-src 'self' 'unsafe-inline'; img-src * data: blob:; frame-src 'self' data: https://*.firebaseapp.com https://accounts.google.com https://*.google.com; font-src 'self' data:; object-src 'none'; base-uri 'self';">
  <meta name="referrer" content="no-referrer">
  <title>임시메일 - Disposable Email</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%233b82f6'/><stop offset='1' stop-color='%236366f1'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><rect x='14' y='20' width='36' height='24' rx='3' fill='none' stroke='white' stroke-width='3.5' stroke-linejoin='round'/><path d='M14 22 L32 34 L50 22' fill='none' stroke='white' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/><circle cx='48' cy='18' r='6' fill='%23fbbf24' stroke='%230f172a' stroke-width='2'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-header">
    <div class="top-inner">
      <div class="brand">
        <h1>임시메일</h1>
        <span class="sync-status" id="syncStatus"></span>
      </div>
      <div class="auth-bar">
        <button id="loginBtn" class="btn btn-outline btn-sm">로그인</button>
        <div id="userInfo" class="user-info" style="display:none;">
          <span id="userEmail"></span>
          <button id="cloudSyncBtn" class="btn btn-outline btn-sm" title="클라우드에서 다시 불러오기">🔄 동기화</button>
          <button id="logoutBtn" class="btn btn-outline btn-sm">로그아웃</button>
        </div>
      </div>
    </div>
  </header>

  <!-- 로그인 모달 -->
  <div class="modal-overlay" id="loginModal" style="display:none;">
    <div class="modal">
      <h2>로그인</h2>
      <p class="modal-desc">로그인하면 모든 브라우저에서 임시 메일 세션이 동기화됩니다.</p>
      <input type="email" id="loginEmail" placeholder="이메일" />
      <input type="password" id="loginPassword" placeholder="비밀번호" />
      <div class="modal-actions">
        <button id="emailLoginBtn" class="btn btn-primary">이메일 로그인</button>
        <button id="googleLoginBtn" class="btn btn-secondary">Google 로그인</button>
      </div>
      <button id="closeModalBtn" class="btn btn-outline">닫기</button>
    </div>
  </div>

  <main class="layout">
    <!-- 좌측 사이드바: 메일 생성 + 목록 -->
    <aside class="sidebar">
      <section class="email-section">
        <div class="email-display" id="emailDisplay">
          <span class="placeholder">메일 주소를 생성하세요</span>
        </div>
        <div class="retention-info" id="retentionInfo"></div>
        <div class="email-actions">
          <button id="generateBtn" class="btn btn-primary">새 메일 생성</button>
          <button id="copyBtn" class="btn btn-secondary" disabled>복사</button>
          <button id="customBtn" class="btn btn-secondary">직접 입력</button>
        </div>
        <div class="custom-email" id="customSection" style="display:none;">
          <div class="custom-input-group">
            <input type="text" id="customLogin" placeholder="아이디" />
            <span>@</span>
            <select id="domainSelect"></select>
          </div>
          <button id="customApplyBtn" class="btn btn-primary">사용하기</button>
        </div>
      </section>

      <section class="history-section" id="historySection" style="display:none;">
        <h2>임시 메일 주소 <span class="history-count" id="historyCount"></span></h2>
        <div class="history-list" id="historyList"></div>
      </section>
    </aside>

    <!-- 우측 메인: 받은 메일함 + 뷰어 -->
    <section class="main-panel">
      <div class="refresh-section">
        <h2 class="panel-title">받은 메일함 <span class="badge" id="mailCount">0</span></h2>
        <label class="auto-refresh">
          <input type="checkbox" id="autoRefresh" checked />
          <span>자동 새로고침 (5초)</span>
        </label>
        <button id="refreshBtn" class="btn btn-outline btn-sm" disabled>새로고침</button>
        <span class="timer" id="timer"></span>
      </div>

      <div class="inbox-wrapper">
        <div class="inbox" id="inbox">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📭</div>
            <p>아직 받은 메일이 없습니다</p>
            <p class="hint">좌측에서 메일을 생성하거나 선택하세요</p>
          </div>
        </div>

        <div class="viewer-section" id="viewerSection" style="display:none;">
          <div class="viewer-header">
            <button id="backBtn" class="btn btn-outline btn-sm">← 목록</button>
            <h2 id="viewerSubject">제목</h2>
            <div class="viewer-nav">
              <button id="prevMailBtn" class="btn btn-outline btn-sm" title="최근 메일 (↑)">▲ 최근</button>
              <span id="mailPosition" class="mail-position"></span>
              <button id="nextMailBtn" class="btn btn-outline btn-sm" title="예전 메일 (↓)">예전 ▼</button>
            </div>
          </div>
          <div class="viewer-meta">
            <div><strong>보낸 사람:</strong> <span id="viewerFrom"></span></div>
            <div><strong>받은 시간:</strong> <span id="viewerDate"></span></div>
          </div>
          <div class="viewer-body" id="viewerBody"></div>
          <div class="viewer-attachments" id="viewerAttachments" style="display:none;">
            <h3>첨부파일</h3>
            <ul id="attachmentList"></ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 알림 토스트 -->
  <div class="toast" id="toast"></div>

  <footer class="site-footer">© 2026 KHS</footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
